<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2048 代数儿何 v0.2.0</title>
  <link rel="apple-touch-icon" sizes="180x180" href="./icon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./icon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./icon/favicon-16x16.png">
  <link rel="manifest" href="./icon/site.webmanifest">
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>
  <main class="game-shell">
    <header class="topbar">
      <div>
        <h1>2048 代数儿何</h1>
        <p>移動方塊來組裝子句, 任意<span class="complete-quote">完整句子</span>可合併消除.
          <span id="adjust-button" class="text-span-button" role="button" tabindex="0">[调整]</span>
          <span id="help-button" class="text-span-button" role="button" tabindex="0">[帮助]</span>
        </p>
      </div>
      <button id="restart" type="button">Restart</button>
    </header>

    <section class="metrics">
      <div class="metric">
        <span>Score</span>
        <strong id="score">0</strong>
      </div>
      <div class="metric">
        <span id="best-score-label"></span>
        <button id="best-score" class="metric-value-button" type="button" aria-live="polite">0</button>
      </div>
      <div class="metric">
        <span>Moves</span>
        <strong id="moves">0</strong>
      </div>
    </section>

    <section class="game-panel">
      <div id="board" class="board" aria-label="game-board"></div>
    </section>

    <section class="controls">
      <button type="button" data-dir="Up">↑</button>
      <button type="button" data-dir="Left">←</button>
      <button type="button" data-dir="Down">↓</button>
      <button type="button" data-dir="Right">→</button>
    </section>

    <p id="status" class="status">
      Use arrow keys / WASD / swipe or buttons to move.
      Press N to restart.
    </p>
    <pre id="events" class="events" aria-live="polite"></pre>

    <section class="completion-panel">
      <ul id="completed-counts" class="completed-counts"></ul>
      <h2>发自我的手机</h2>
    </section>
  </main>

  <script type="module" src="./main.js"></script>
</body>

</html>
